services:
  - type: web
    name: awun-api
    runtime: docker
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: AWUN_MAX_LIMIT
        value: "100"
      - key: AWUN_DEFAULT_LIMIT
        value: "30"
      - key: AWUN_SEARCH_TIMEOUT_SECONDS
        value: "35"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: AWUN_MEDIA_SECRET
        generateValue: true
      - key: AWUN_YOUTUBE_API_KEY
        sync: false
      - key: AWUN_SOUNDCLOUD_CLIENT_ID
        sync: false
      - key: AWUN_SOUNDCLOUD_CLIENT_SECRET
        sync: false
      - key: AWUN_VK_ACCESS_TOKEN
        sync: false
      - key: AWUN_AUDIUS_API_KEY
        sync: false
      - key: AWUN_JAMENDO_CLIENT_ID
        sync: false
