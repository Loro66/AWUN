name: Mobile beta builds

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Build installable beta APK
        run: gradle -p mobile/android --no-daemon assembleDebug
      - name: Prepare Android artifact
        run: |
          mkdir -p dist/android
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk dist/android/AWUN-Android-beta.apk
          sha256sum dist/android/AWUN-Android-beta.apk > dist/android/AWUN-Android-beta.apk.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: AWUN-Android-beta
          path: dist/android
          if-no-files-found: error

  ios:
    name: iOS IPA and Simulator
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
      - name: Build unsigned device application
        run: >-
          xcodebuild -project mobile/ios/AWUN.xcodeproj -scheme AWUN
          -configuration Release -sdk iphoneos -derivedDataPath build/ios
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO build
      - name: Build Simulator application
        run: >-
          xcodebuild -project mobile/ios/AWUN.xcodeproj -scheme AWUN
          -configuration Release -sdk iphonesimulator -derivedDataPath build/ios
          CODE_SIGNING_ALLOWED=NO build
      - name: Package iOS artifacts
        run: |
          mkdir -p dist/ios/Payload
          cp -R build/ios/Build/Products/Release-iphoneos/AWUN.app dist/ios/Payload/AWUN.app
          ditto -c -k --sequesterRsrc --keepParent dist/ios/Payload dist/ios/AWUN-iOS-unsigned.ipa
          ditto -c -k --sequesterRsrc --keepParent build/ios/Build/Products/Release-iphonesimulator/AWUN.app dist/ios/AWUN-iOS-Simulator.zip
          shasum -a 256 dist/ios/AWUN-iOS-unsigned.ipa dist/ios/AWUN-iOS-Simulator.zip > dist/ios/SHA256SUMS.txt
          rm -rf dist/ios/Payload
      - uses: actions/upload-artifact@v4
        with:
          name: AWUN-iOS-beta
          path: dist/ios
          if-no-files-found: error
