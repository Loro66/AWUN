name: Windows desktop build

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-desktop.txt
      - name: Install desktop dependencies
        run: python -m pip install -r requirements-desktop.txt
      - name: Build AWUN.exe
        run: pyinstaller --noconfirm --clean --onefile --windowed --name AWUN desktop/launcher.py
      - name: Create SHA256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist/AWUN.exe -Algorithm SHA256).Hash.ToLower()
          Set-Content -Encoding ascii dist/AWUN.exe.sha256 "$hash *AWUN.exe"
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AWUN-Windows-x64
          path: |
            dist/AWUN.exe
            dist/AWUN.exe.sha256
          if-no-files-found: error
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: AWUN-Windows-x64
          path: dist
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/AWUN.exe dist/AWUN.exe.sha256 --generate-notes --title "AWUN ${{ github.ref_name }}"
